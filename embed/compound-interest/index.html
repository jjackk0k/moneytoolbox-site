<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Compound Interest Projector — MoneyToolbox widget</title>
  <link rel="stylesheet" href="../../assets/style.css">
</head>
<body class="embed">
  <main>
    <div class="card">
      <label for="principal">Starting amount ($)</label>
      <input id="principal" type="number" min="0" step="100" value="1000" inputmode="decimal">
      <label for="monthly">Monthly contribution ($)</label>
      <input id="monthly" type="number" min="0" step="25" value="200" inputmode="decimal">
      <label for="rate">Annual return / rate (%)</label>
      <input id="rate" type="number" min="0" max="30" step="0.1" value="7" inputmode="decimal">
      <input id="rateR" class="slider" type="range" min="0" max="15" step="0.1" value="7" aria-label="Rate slider">
      <label for="years">Years</label>
      <input id="years" type="number" min="1" max="60" step="1" value="20" inputmode="decimal">
      <input id="yearsR" class="slider" type="range" min="1" max="50" step="1" value="20" aria-label="Years slider">
    </div>
    <div id="results" class="reveal">
      <div class="stats">
        <div class="stat"><span class="k">Future value</span><span class="v brass" id="sFV">$0</span></div>
        <div class="stat"><span class="k">You put in</span><span class="v" id="sIn">$0</span></div>
        <div class="stat"><span class="k">Growth</span><span class="v sage" id="sGrow">$0</span></div>
      </div>
      <div class="card">
        <svg class="chart" id="chart" height="200" role="img" aria-label="Balance growth chart"></svg>
        <div class="legend">
          <span><i class="dot" style="background:#c9a24a"></i> Balance</span>
          <span><i class="dot" style="background:#c9bfa8"></i> Contributed</span>
        </div>
      </div>
    </div>
    <a class="attrib" href="../../tools/compound-interest/" target="_blank" rel="noopener">Compound Interest Projector by <b>MoneyToolbox</b> ↗</a>
  </main>
  <script src="../../assets/ui.js"></script>
  <script src="../../tools/compound-interest/app.js"></script>
</body>
</html>
